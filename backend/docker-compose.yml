services:
  collector:
    build: .
    command: python -m solar_advisor.collector
    environment:
      SA_MQTT_HOST: ${SA_MQTT_HOST:?set in .env}
      SA_MQTT_PORT: ${SA_MQTT_PORT:-1883}
      SA_MQTT_USER: ${SA_MQTT_USER:-}
      SA_MQTT_PASS: ${SA_MQTT_PASS:-}
      SA_DB_PATH: /data/solar_advisor.db
      SA_TELEMETRY_RETENTION_DAYS: ${SA_TELEMETRY_RETENTION_DAYS:-90}
    volumes:
      - sa_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      SA_MQTT_HOST: ${SA_MQTT_HOST:?set in .env}
      SA_MQTT_PORT: ${SA_MQTT_PORT:-1883}
      SA_MQTT_USER: ${SA_MQTT_USER:-}
      SA_MQTT_PASS: ${SA_MQTT_PASS:-}
      SA_DB_PATH: /data/solar_advisor.db
      SA_TARIFF_RATE: ${SA_TARIFF_RATE:-3.56}
      SA_TARIFF_FIXED_CHARGE: ${SA_TARIFF_FIXED_CHARGE:-600}
      SA_MAX_GRID_CHARGE_POWER_W: ${SA_MAX_GRID_CHARGE_POWER_W:-3640}
      SA_FORECAST_SOURCE: ${SA_FORECAST_SOURCE:-static}
      SA_LAT: ${SA_LAT:--33.92}
      SA_LON: ${SA_LON:-18.42}
      SA_PV_ARRAYS: ${SA_PV_ARRAYS:-}
      SA_FORECAST_TTL_S: ${SA_FORECAST_TTL_S:-10800}
      SA_TIMEZONE: ${SA_TIMEZONE:-Africa/Johannesburg}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set in .env}
      SA_EXPLAIN_MODEL: ${SA_EXPLAIN_MODEL:-claude-haiku-4-5}
      SA_EXPLAIN_ENABLED: ${SA_EXPLAIN_ENABLED:-true}
    ports:
      - "8000:8000"
    volumes:
      - sa_data:/data
    restart: unless-stopped

  web:
    # The compose file lives in backend/, so the frontend build context is ../frontend.
    build:
      context: ../frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sa_data:
