server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend container (the app calls same-origin /api/*,
  # so VITE_API_BASE stays empty in production).
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Content-hashed bundles change name on every build, so they're safe to cache
  # forever — this is what makes a redeploy instant for already-loaded clients.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache the HTML entry point, so a new deploy is picked up immediately
  # (otherwise a kiosk keeps serving a stale bundle until its heuristic cache
  # expires — e.g. an embedded view ignoring a just-shipped change).
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
